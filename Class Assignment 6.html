<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration-Form</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .form-container {
            width: 450px;
            background-color: #1e2436; /* Dark Blue Body */
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header {
            background-color: #e08b14; /* Orange Header */
            color: #fdfefe;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: 500;
        }

        .form-body {
            padding: 25px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .form-group label {
            width: 35%;
            color: #d1cc7a; /* Golden/Yellowish text */
            font-size: 15px;
            text-align: right;
            padding-right: 15px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group input[type="password"],
        .form-group select {
            width: 65%;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
            outline: none;
        }

        .radio-group {
            width: 65%;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #d1cc7a;
            font-size: 15px;
        }

        .radio-group input {
            margin-right: 5px;
        }

        .terms-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            margin-bottom: 10px;
            color: #d1cc7a;
            font-size: 15px;
        }

        .footer {
            background-color: #e08b14; /* Orange Footer */
            padding: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn {
            padding: 8px 25px;
            border: none;
            border-radius: 3px;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-submit {
            background-color: #5cb85c; /* Green Submit */
        }

        .btn-cancel {
            background-color: #d9534f; /* Red Cancel */
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">Sign Up</div>

    <form>
        <div class="form-body">
            
            <div class="form-group">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" placeholder="Enter First Name">
            </div>

            <div class="form-group">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" placeholder="Enter Last Name">
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label style="width:auto; text-align:left; padding:0;"><input type="radio" name="gender" value="male"> Male</label>
                    <label style="width:auto; text-align:left; padding:0;"><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <select id="country">
                    <option value="">Country</option>
                    <option value="india">India</option>
                    <option value="usa">USA</option>
                    <option value="uk">UK</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Enter E-mail">
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" placeholder="Enter Phone">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password">
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password">
            </div>

            <div class="terms-group">
                <input type="checkbox" id="terms">
                <label for="terms" style="color: #d1cc7a; font-size: 15px; cursor: pointer;">I Agree to the Terms of use</label>
            </div>

        </div>

        <div class="footer">
            <button type="submit" class="btn btn-submit">Submit</button>
            <button type="button" class="btn btn-cancel">Cancel</button>
        </div>
    </form>
</div>

</body>
</html>
